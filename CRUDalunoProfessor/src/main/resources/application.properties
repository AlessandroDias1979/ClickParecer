spring.application.name=demo

# Banco de dados MySQL remoto
spring.datasource.url=jdbc:mysql://avaliacaotcc.mysql.dbaas.com.br/avaliacaotcc
spring.datasource.username=avaliacaotcc
spring.datasource.password=Avaliacao@TCC2
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.generate-ddl=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Mostra no console do Spring o SQL que ele está executando (ótimo para estudos!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true